<view class="container">

  <view class="content">
    <view class="table-header">
      <text class="header-cell">学号</text>
      <text class="header-cell">姓名</text>
      <text class="header-cell">院系</text>
      <text class="header-cell">审核人ID</text>
      <text class="header-cell">担保权限到期时间</text>
    </view>

    <scroll-view scroll-y class="table-body" bindscrolltolower="loadMore">
      <view wx:for="{{students}}" wx:key="student_id" class="table-row">
        <text class="cell">{{item.student_id}}</text>
        <text class="cell">{{item.student_name}}</text>
        <text class="cell">{{item.school}}</text>
        <text class="cell">{{item.reviewer_id}}</text>
        <text class="cell">{{item.guarantee_permission_formatted}}</text>
      </view>

      <view wx:if="{{loading}}" class="loading">
        <text>加载中...</text>
      </view>

      <view wx:if="{{!loading && students.length === 0}}" class="empty">
        <text>暂无数据</text>
      </view>
    </scroll-view>
  </view>
</view>
